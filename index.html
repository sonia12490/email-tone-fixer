<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Tone Fixer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8402a;
    --gold: #d4a843;
    --muted: #7a7468;
    --border: #d4cfc4;
    --white: #fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(200,64,42,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(212,168,67,0.08) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1.5px solid var(--border);
    position: relative;
  }

  header::before {
    content: '✉';
    display: block;
    font-size: 2rem;
    margin-bottom: 12px;
    opacity: 0.6;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .tagline {
    margin-top: 10px;
    color: var(--muted);
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* TONE SELECTOR */
  .tone-section {
    margin-bottom: 32px;
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .tones {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .tone-btn {
    padding: 9px 20px;
    border-radius: 2px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .tone-btn:hover {
    border-color: var(--ink);
    background: var(--cream);
  }

  .tone-btn.active {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
  }

  /* EDITOR AREA */
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }

  @media (max-width: 640px) {
    .editor-grid { grid-template-columns: 1fr; }
  }

  .editor-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 320px;
  }

  .editor-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .editor-card-title {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .char-count {
    font-size: 0.72rem;
    color: var(--muted);
  }

  textarea {
    flex: 1;
    width: 100%;
    padding: 18px;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    line-height: 1.7;
    color: var(--ink);
    background: transparent;
    resize: none;
  }

  textarea::placeholder { color: #b5b0a8; }

  .output-area {
    flex: 1;
    padding: 18px;
    font-size: 0.93rem;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }

  .output-placeholder {
    color: #b5b0a8;
    font-style: italic;
  }

  .output-text {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* COPY BTN */
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 10px;
    font-size: 0.72rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--cream); color: var(--ink); }
  .copy-btn.copied { color: var(--accent); border-color: var(--accent); }

  /* FIX BUTTON */
  .fix-btn {
    display: block;
    width: 100%;
    padding: 17px;
    background: var(--ink);
    color: var(--white);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
  }

  .fix-btn:hover { background: #2d2d4a; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .fix-btn:active { transform: translateY(0); }
  .fix-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .fix-btn .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* LOADING */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TONE BADGE */
  .tone-badge {
    display: inline-block;
    padding: 3px 10px;
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 2px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* DIFFERENCE HIGHLIGHTS */
  .diff-section {
    margin-top: 28px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: none;
  }

  .diff-header {
    padding: 12px 16px;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .diff-body {
    padding: 18px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .diff-pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .diff-pill.added { background: #e8f5e9; color: #2e7d32; }
  .diff-pill.removed { background: #fce4e4; color: #c62828; }
  .diff-pill.changed { background: #fff3e0; color: #e65100; }

  /* ERROR */
  .error-msg {
    margin-top: 12px;
    padding: 12px 16px;
    background: #fce4e4;
    border-radius: 3px;
    color: #c62828;
    font-size: 0.88rem;
    display: none;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <h1>Email Tone <span>Fixer</span></h1>
  <p class="tagline">Paste your draft · Pick a tone · Get a better email instantly</p>
</header>

<main>

  <!-- TONE SELECTOR -->
  <div class="tone-section">
    <div class="section-label">Choose Target Tone</div>
    <div class="tones">
      <button class="tone-btn active" data-tone="Professional">💼 Professional</button>
      <button class="tone-btn" data-tone="Friendly">😊 Friendly</button>
      <button class="tone-btn" data-tone="Firm">🎯 Firm & Direct</button>
      <button class="tone-btn" data-tone="Apologetic">🙏 Apologetic</button>
      <button class="tone-btn" data-tone="Persuasive">✨ Persuasive</button>
      <button class="tone-btn" data-tone="Concise">⚡ Concise</button>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-grid">
    <div class="editor-card">
      <div class="editor-card-header">
        <span class="editor-card-title">Your Draft</span>
        <span class="char-count" id="charCount">0 chars</span>
      </div>
      <textarea id="inputEmail" placeholder="Paste your email draft here...

Example: 'Hey, you still haven't sent me those files. I need them NOW. This is getting ridiculous.'" spellcheck="true"></textarea>
    </div>

    <div class="editor-card">
      <div class="editor-card-header">
        <span class="editor-card-title">Fixed Version <span class="tone-badge" id="toneBadge">Professional</span></span>
        <button class="copy-btn" id="copyBtn" onclick="copyOutput()">Copy</button>
      </div>
      <div class="output-area" id="outputArea">
        <span class="output-placeholder">Your rewritten email will appear here...</span>
      </div>
    </div>
  </div>

  <button class="fix-btn" id="fixBtn" onclick="fixEmail()">
    <div class="btn-inner">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Fix My Email Tone →</span>
    </div>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <!-- WHAT CHANGED -->
  <div class="diff-section" id="diffSection">
    <div class="diff-header">What Changed</div>
    <div class="diff-body" id="diffBody"></div>
  </div>

</main>

<footer>Email Tone Fixer &mdash; Free &middot; No login &middot; No data stored</footer>

<script>
  const TONES = {
    "Professional": "formal, respectful, and polished — appropriate for workplace communication",
    "Friendly": "warm, approachable, and conversational — like writing to a colleague you like",
    "Firm": "direct, assertive, and clear — no fluff, gets to the point, sets boundaries confidently",
    "Apologetic": "sincere, empathetic, and accountable — takes responsibility without being overly submissive",
    "Persuasive": "compelling, enthusiastic, and motivating — makes the reader want to say yes",
    "Concise": "brief and to the point — strips out all filler, keeps only essential information"
  };

  let selectedTone = "Professional";

  // Tone buttons
  document.querySelectorAll('.tone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTone = btn.dataset.tone;
      document.getElementById('toneBadge').textContent = selectedTone;
    });
  });

  // Char count
  document.getElementById('inputEmail').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length + ' chars';
  });

  async function fixEmail() {
    const input = document.getElementById('inputEmail').value.trim();
    if (!input) {
      showError('Please paste your email draft first.');
      return;
    }
    if (input.length < 10) {
      showError('Please enter a longer email to fix.');
      return;
    }

    setLoading(true);
    hideError();

    const systemPrompt = `You are an expert email communication coach. Your job is to rewrite emails to match a specific tone while preserving the core message and intent.

Rewrite the email in a ${selectedTone} tone: ${TONES[selectedTone]}.

Rules:
- Keep the same core message and facts
- Do NOT change names, dates, or specific details
- Make it sound natural, not robotic
- Return ONLY the rewritten email — no explanation, no preamble, no labels
- After the rewritten email, add exactly this separator on a new line: ---CHANGES---
- Then list 3-5 short bullet points (starting with •) describing what you changed about the tone`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: "user", content: input }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const full = data.content.map(b => b.text || '').join('');
      const parts = full.split('---CHANGES---');
      const rewritten = parts[0].trim();
      const changes = parts[1] ? parts[1].trim() : '';

      // Show output
      const outputArea = document.getElementById('outputArea');
      outputArea.innerHTML = `<div class="output-text">${escapeHtml(rewritten)}</div>`;

      // Show changes
      if (changes) {
        const bullets = changes.split('\n').filter(l => l.trim().startsWith('•'));
        if (bullets.length) {
          const diffBody = document.getElementById('diffBody');
          diffBody.innerHTML = bullets.map(b => {
            const text = b.replace('•', '').trim();
            return `<div class="diff-pill changed">✦ ${escapeHtml(text)}</div>`;
          }).join('');
          document.getElementById('diffSection').style.display = 'block';
        }
      }

    } catch (err) {
      showError('Something went wrong. Please try again. (' + err.message + ')');
    } finally {
      setLoading(false);
    }
  }

  function copyOutput() {
    const area = document.getElementById('outputArea');
    const text = area.innerText;
    if (!text || text.includes('Your rewritten email')) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function setLoading(on) {
    const btn = document.getElementById('fixBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    btn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    btnText.textContent = on ? 'Rewriting...' : 'Fix My Email Tone →';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
